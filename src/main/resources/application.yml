spring:
  application:
    name: m2-partidos-candidatos-votaciones
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/elecciones
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/elecciones
    user: postgres
    password: postgres

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:super-secret-key-that-is-long-enough-for-hs256-algorithm-minimum-32-characters}
  expiration: 86400000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  timeout-seconds: 10

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

app:
  mod1:
    base-url: ${MOD1_BASE_URL:http://localhost:8080}
    connect-timeout: 2000
    read-timeout: 3000

resilience4j:
  circuitbreaker:
    instances:
      modulo1:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
